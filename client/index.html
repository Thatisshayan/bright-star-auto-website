<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1"
    />
    <meta
      name="description"
      content="North York's premier auto bodyshop. Expert collision repair, paint refinishing, dent removal & insurance claims. Free estimates. 4.9★ rated. Call (416) 635-0812."
    />
    <meta
      name="keywords"
      content="auto bodyshop, collision repair, paint refinishing, North York, Toronto, dent removal, frame straightening"
    />
    <meta name="author" content="Bright Star Auto Ltd" />
    <meta
      property="og:title"
      content="Bright Star Auto Ltd - Premium Auto Bodyshop"
    />
    <meta
      property="og:description"
      content="North York's premier auto bodyshop. Expert collision repair, paint refinishing, and restoration."
    />
    <meta property="og:type" content="business.business" />
    <meta property="og:url" content="https://brightstarauto.net" />
    <meta
      property="og:image"
      content="https://brightstarauto.net/brand/logo.png"
    />
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Bright Star Auto Ltd - Premium Auto Bodyshop"
    />
    <meta
      name="twitter:description"
      content="Expert collision repair, paint refinishing, and restoration in North York."
    />
    <meta
      name="twitter:image"
      content="https://brightstarauto.net/brand/logo.png"
    />
    <title>Bright Star Auto Ltd | Premium Auto Bodyshop North York, ON</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="preload"
      as="image"
      href="/gallery/hero-orange-car.jpg"
      fetchpriority="high"
    />
    <link rel="icon" type="image/png" href="/brand/logo.png" />
    <link rel="apple-touch-icon" href="/brand/logo.png" />
    <link rel="canonical" href="https://brightstarauto.net" />
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "LocalBusiness",
        "name": "Bright Star Auto Ltd",
        "image": "https://brightstarauto.net/brand/logo.png",
        "description": "Premium auto bodyshop offering collision repair, paint refinishing, dent removal, and frame straightening.",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "51 Toro Road North, Unit #3",
          "addressLocality": "North York",
          "addressRegion": "ON",
          "postalCode": "M3J 2A4",
          "addressCountry": "CA"
        },
        "telephone": "+1-416-635-0812",
        "url": "https://brightstarauto.net",
        "priceRange": "$$",
        "aggregateRating": {
          "@type": "AggregateRating",
          "ratingValue": "4.9",
          "reviewCount": "61"
        },
        "openingHoursSpecification": [
          {
            "@type": "OpeningHoursSpecification",
            "dayOfWeek": [
              "Monday",
              "Tuesday",
              "Wednesday",
              "Thursday",
              "Friday"
            ],
            "opens": "09:00",
            "closes": "18:00"
          },
          {
            "@type": "OpeningHoursSpecification",
            "dayOfWeek": "Saturday",
            "opens": "09:00",
            "closes": "16:00"
          }
        ]
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <!-- Static replica of the React contact form so Netlify's build-time bot
         can detect and register it (Netlify Forms only scans static HTML). -->
    <!-- netlify-forms-detect: 2026-07-09T00:00:00Z -->
    <form
      name="contact"
      data-netlify="true"
      data-netlify-honeypot="bot-field"
      hidden
    >
      <input type="text" name="name" />
      <input type="tel" name="phone" />
      <input type="email" name="email" />
      <input type="text" name="vehicle" />
      <input type="text" name="service" />
      <textarea name="message"></textarea>
      <input type="text" name="bot-field" />
    </form>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"
    ></script>
  </body>
</html>
